<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Track your order</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body { min-height: 100vh; display: flex; flex-direction: column; font-family: 'Montserrat', sans-serif; background: transparent; }

    /* ── Nav ── */
    nav { flex-shrink: 0; width: 100%; background: #6B1AFF; display: flex; align-items: center; justify-content: space-between; padding: 0 clamp(16px, 2.5vw, 48px); height: clamp(56px, 6vw, 87px); z-index: 10; }
    .nav-logo { flex-shrink: 0; display: flex; align-items: center; text-decoration: none; }
    .nav-logo-text { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: clamp(13px, 1.1vw, 16px); color: #fff; letter-spacing: 0.8px; }
    .nav-logo-text span { color: #05E7FF; }
    .nav-logo img { display: none; height: clamp(28px, 2.8vw, 40.5px); width: auto; object-fit: contain; max-width: none; }
    .nav-links { display: flex; align-items: center; gap: clamp(4px, 0.5vw, 8px); }
    .nav-links a, .nav-links span { display: flex; align-items: center; justify-content: center; padding: 6px clamp(10px, 0.9vw, 13.5px); border-radius: 100px; text-decoration: none; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: clamp(14px, 1vw, 16px); color: #fff; letter-spacing: 0.08px; white-space: nowrap; }

    /* ── Page body ── */
    .page-body {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 0; position: relative; overflow: hidden;
      background: url('images/background-blobs.png') center center / cover no-repeat;
    }

    /* ── Centered content ── */
    .content-col { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; width: 100%; padding: clamp(32px, 5vh, 80px) clamp(24px, 4vw, 60px); }
    .content-inner { display: flex; flex-direction: column; align-items: center; text-align: center; width: 100%; max-width: 865px; }

    /* Text group */
    .text-group { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 28px; }
    h1 { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: clamp(26px, 2.8vw, 36px); line-height: 1.3; color: #1a1a2e; }
    .subtitle { font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: clamp(14px, 1.1vw, 17px); line-height: 1.5; color: #3a3a3a; }
    .tip { font-family: 'Montserrat', sans-serif; font-weight: 400; font-size: clamp(12px, 0.85vw, 14px); line-height: 1.6; color: #777; }

    /* Search box */
    .search-box { display: flex; align-items: center; width: 100%; max-width: 865px; background: #fff; border: 1px solid rgba(0, 0, 0, 0.1); border-radius: 10px; padding: 6px 6px 6px 16px; margin-bottom: 24px; gap: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
    .search-placeholder { flex: 1; min-width: 0; font-family: 'Montserrat', sans-serif; font-weight: 500; font-size: clamp(13px, 0.95vw, 15px); line-height: 1.4; color: #040404; border: none; outline: none; background: transparent; padding: 8px 4px; }
    .search-placeholder::placeholder { color: #999; font-weight: 400; }
    .track-btn { flex-shrink: 0; display: flex; align-items: center; justify-content: center; height: 48px; padding: 0 24px; background: #6B1AFF; border-radius: 8px; border: none; cursor: pointer; transition: background 0.15s; }
    .track-btn:hover { background: #5a14d9; }
    .track-btn span { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 14px; color: #fff; letter-spacing: 0.02em; white-space: nowrap; }



    /* ── Footer ── */
    footer { position: absolute; bottom: 16px; left: 0; width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 22px clamp(24px, 4vw, 64px) 12px; background: none; border-top: 1px solid rgba(0,0,0,0.1); }
    .footer-left p, .footer-right p { font-family: 'Montserrat', sans-serif; font-size: clamp(11px, 0.75vw, 13px); line-height: 19.5px; color: rgba(22, 22, 22, 0.65); }
    .footer-left .normal { font-weight: 500; }
    .footer-left .bold { font-weight: 600; text-transform: uppercase; }
    .footer-right p { font-weight: 500; }

    /* ── Admin iframe preview scaling ── */
    body.preview-embedded { font-size: 10px; }
    body.preview-embedded nav { height: 40px; padding: 0 12px; }
    body.preview-embedded .nav-logo-text { font-size: 10px; letter-spacing: 0.5px; }
    body.preview-embedded .nav-links span,
    body.preview-embedded .nav-links a { font-size: 10px; padding: 3px 6px; }
    body.preview-embedded .content-col { padding: 16px 20px; }
    body.preview-embedded .content-inner { max-width: 70%; }
    body.preview-embedded .text-group { gap: 4px; margin-bottom: 14px; }
    body.preview-embedded h1 { font-size: 18px; line-height: 1.3; }
    body.preview-embedded .subtitle { font-size: 11px; }
    body.preview-embedded .tip { font-size: 9px; }
    body.preview-embedded .search-box { max-width: 100%; padding: 4px 4px 4px 10px; gap: 4px; border-radius: 6px; }
    body.preview-embedded .search-placeholder { font-size: 10px; padding: 4px 4px; }
    body.preview-embedded .track-btn { height: 32px; padding: 0 14px; border-radius: 5px; }
    body.preview-embedded .track-btn span { font-size: 10px; }
    body.preview-embedded footer { bottom: 8px; padding: 6px 12px; }
    body.preview-embedded footer p { font-size: 8px; }
    body.preview-embedded .footer-left .bold { font-size: 8px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .page-body { padding: 0 16px; }
      .content-col { padding: 32px 0; }
      .content-inner { max-width: 100%; }
      h1 { font-size: 26px; }
      .subtitle { font-size: 14px; }
      .search-box { flex-direction: column; align-items: stretch; background: transparent; border: none; border-radius: 0; padding: 0; gap: 12px; max-width: 100%; box-shadow: none; }
      .search-placeholder { height: 52px; background: #fff; border: 1px solid rgba(0,0,0,0.15); border-radius: 8px; padding: 0 16px; font-size: 14px; display: block; flex: none; width: 100%; }
      .track-btn { height: 52px; width: 100%; border-radius: 8px; padding: 0; }
    }
  </style>
</head>
<body>

<!-- Navigation -->
<nav>
  <a class="nav-logo" href="#">
    <span class="nav-logo-text">BORDERLESS<span>360</span></span>
    <img src="" alt="Logo" />
  </a>
  <div class="nav-links">
    <span>Shop</span>
    <span>FAQ</span>
  </div>
</nav>

<!-- Page body -->
<div class="page-body">

  <!-- Centered content -->
  <div class="content-col">
    <div class="content-inner">

      <div class="text-group">
        <h1 id="page-title-display">Track your order</h1>
        <p class="subtitle">Enter your tracking number to see the latest delivery updates.</p>
        <p class="tip">Your tracking number is in your shipping confirmation email</p>
      </div>

      <div class="search-box">
        <input class="search-placeholder" type="text" placeholder="Enter your tracking number: e.g. AA1223456789AUS" />
        <button class="track-btn" onclick="doSearch()"><span>Track my delivery</span></button>
      </div>


    </div>
  </div>

  <!-- Footer -->
  <footer>
    <div class="footer-left">
      <p><span class="normal">Powered by </span><span class="bold">Borderless360</span></p>
    </div>
    <div class="footer-right">
      <p>&copy; 2017-2026 Borderless360 Limited. All rights reserved.</p>
    </div>
  </footer>

</div>

<script>
// ── Search action ──
function doSearch() {
  var input = document.querySelector('.search-placeholder');
  var val = input.value.trim();
  if (!val) { input.focus(); return; }
  window.location.href = 'tracking-demo.html?ref=' + encodeURIComponent(val);
}
document.querySelector('.search-placeholder').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doSearch();
});

// ── Branding ──
function applyBranding(c) {
  const nav = document.querySelector('nav');
  if (nav && c.headerColour) {
    nav.style.background = c.headerColour;
  }
  const trackBtn = document.querySelector('.track-btn');
  if (trackBtn && c.headerColour) trackBtn.style.background = c.headerColour;

  if (c.linkColour) {
    document.querySelectorAll('.nav-links a').forEach(a => a.style.color = c.linkColour);
  }

  // Logo: if a custom logo URL is provided, show the img, hide the text
  const logoImg = document.querySelector('.nav-logo img');
  const logoText = document.querySelector('.nav-logo-text');
  if (logoImg) {
    if (c.logoUrl) {
      logoImg.src = c.logoUrl;
      logoImg.style.display = 'block';
      if (logoText) logoText.style.display = 'none';
    } else {
      logoImg.style.display = 'none';
      if (logoText) logoText.style.display = '';
    }
  }

  if (c.faviconUrl) {
    let link = document.querySelector("link[rel*='icon']") || document.createElement('link');
    link.rel = 'icon';
    link.href = c.faviconUrl;
    document.head.appendChild(link);
  }

  if (c.pageTitle) {
    const el = document.getElementById('page-title-display');
    if (el) el.textContent = c.pageTitle;
  }

  if (c.titleFont) {
    const h1 = document.querySelector('h1');
    if (h1) h1.style.fontFamily = c.titleFont + ', sans-serif';
  }
  if (c.bodyFont) document.body.style.fontFamily = c.bodyFont + ', sans-serif';

  if (c.navLinks) {
    const navLinksEl = document.querySelector('.nav-links');
    if (navLinksEl) {
      navLinksEl.innerHTML = '';
      c.navLinks.forEach(lnk => {
        if (lnk.text) {
          const a = document.createElement('a');
          a.href = lnk.url || '#';
          a.textContent = lnk.text;
          if (c.linkColour) a.style.color = c.linkColour;
          navLinksEl.appendChild(a);
        }
      });
    }
  }

  if (c.supportEmail) { const el = document.getElementById('help-email'); if (el) el.textContent = c.supportEmail; }
  if (c.supportPhone) { const el = document.getElementById('help-phone'); if (el) el.textContent = c.supportPhone; }
}

window.addEventListener('message', function(e) {
  if (!e.data || e.data.type !== 'admin-config') return;
  applyBranding(e.data.config);
  if (!e.data.fromStorage) {
    document.body.classList.add('preview-embedded');
  }
});

// ── Apply saved branding from admin on page load ──
(function() {
  const saved = localStorage.getItem('tracking-admin-config');
  if (!saved) return;
  try { applyBranding(JSON.parse(saved)); } catch(e) {}
})();
</script>
</body>
</html>
